name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Show Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Cognautic-Debug-APK
          path: native/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon
        continue-on-error: true

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Cognautic-Release-APK
          path: native/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Upload Mapping Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mapping-Files
          path: native/app/build/outputs/mapping/
          if-no-files-found: ignore