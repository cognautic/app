name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create gradle wrapper directory
        run: mkdir -p gradle/wrapper

      - name: Download Gradle wrapper JAR
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/releases/download/v8.5/gradle-8.5-wrapper.jar
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Failed to download Gradle wrapper JAR"
            exit 1
          fi

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Download Gradle dependencies
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
        if: success()      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
        if: success()
